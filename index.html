<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHMEDAI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <header class="topbar">

    <div class="logo">AHMEDAI</div>

    <div class="top-actions">
      <button id="settingsBtn">⚙</button>
    </div>

  </header>

  <!-- HERO / WELCOME -->
  <section class="hero">

    <h1>دستیار هوشمند فارسی</h1>
    <p>برای آموزش، تولید محتوا و کارهای روزمره</p>

  </section>

  <!-- FEATURE CARDS -->
  <section class="cards">

    <div class="card">📚 آموزش</div>
    <div class="card">✍️ تولید محتوا</div>
    <div class="card">💬 چت هوشمند</div>
    <div class="card">🌍 ترجمه</div>

  </section>

  <!-- CHAT -->
  <main class="chat">

    <div id="messages" class="messages">

      <div class="bot">
        👋 سلام! من AHMEDAI هستم
      </div>

    </div>

  </main>

  <!-- INPUT -->
  <footer class="input-bar">

    <input id="userInput" placeholder="پیام بنویس...">

    <button id="sendBtn">ارسال</button>

  </footer>

</div>

<!-- MODAL -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-box">
    <button id="closeSettings">بستن</button>
    <button id="clearChat">پاک کردن چت</button>
    <button id="aboutBtn">درباره</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
