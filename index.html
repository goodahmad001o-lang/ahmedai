<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHMEDAI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== APP ===== -->
<div class="app">

  <!-- ===== TOPBAR ===== -->
  <header class="topbar">

    <button id="menuBtn" class="icon-btn">☰</button>

    <div class="logo">AHMEDAI</div>

    <button id="settingsBtn" class="icon-btn">⚙</button>

  </header>

  <!-- ===== CHAT ===== -->
  <main class="chat">

    <div id="messages" class="messages">

      <div class="bot">
        👋 سلام! من AHMEDAI هستم
      </div>

    </div>

  </main>

  <!-- ===== INPUT ===== -->
  <footer class="input-bar">

    <input id="userInput" placeholder="پیام بنویس...">

    <button id="sendBtn">ارسال</button>

  </footer>

</div>

<!-- ================= DRAWER ================= -->
<div id="drawer" class="drawer hidden">

  <div class="drawer-box">

    <h3>منو</h3>

    <button id="clearChat">🗑 پاک کردن چت</button>
    <button id="aboutBtn">ℹ درباره</button>
    <button id="openPro">💎 اشتراک Pro</button>

    <button id="closeDrawer">بستن</button>

  </div>

</div>

<!-- ================= SETTINGS MODAL ================= -->
<div id="settingsModal" class="modal hidden">

  <div class="modal-box">

    <h3>تنظیمات</h3>

    <p>نسخه AHMEDAI V8</p>

    <button id="closeSettings">بستن</button>

  </div>

</div>

<!-- ================= PRO MODAL ================= -->
<div id="proModal" class="modal hidden">

  <div class="modal-box">

    <h3>AHMEDAI Pro 💎</h3>

    <p>دسترسی نامحدود + سرعت بیشتر</p>

    <button id="closePro">بستن</button>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
<script src="app.js" defer></script>
