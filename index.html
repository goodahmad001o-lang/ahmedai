<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AhmedAI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header class="header">
  <div class="logo">AhmedAI</div>

  <button id="settingsBtn" class="icon-btn">⚙</button>
</header>

<main class="chat">

  <div id="messages" class="messages">

    <div class="bot">
      سلام 👋 من AhmedAI هستم
    </div>

  </div>

</main>

<footer class="input-area">

  <input id="userInput" type="text" placeholder="پیام بنویس...">

  <button id="sendBtn">ارسال</button>

</footer>

</div>

<div id="settingsModal" class="modal hidden">
  <div class="box">

    <button id="closeSettings">بستن</button>
    <button id="clearChat">پاک کردن چت</button>
    <button id="aboutBtn">درباره</button>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
